apiVersion: apps/v1
kind: Deployment

metadata:
  name: currency-app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: currency-app

  template:
    metadata:
      labels:
        app: currency-app

    spec:
      containers:
      - name: currency-app

        image: ogccr.azurecr.io/currency-app:latest

        imagePullPolicy: Always

        ports:
        - containerPort: 80

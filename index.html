<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OG Currency Converter</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>💱 <span>OG</span> Currency Converter</h1>

    <input type="number" id="amount" placeholder="Enter amount" />

    <div class="currency-row">
      <div class="currency-box">
        <img id="from-flag" src="https://flagcdn.com/w20/us.png" alt="From" />
        <select id="from"></select>
      </div>

      <button id="swap">↔️</button>

      <div class="currency-box">
        <img id="to-flag" src="https://flagcdn.com/w20/in.png" alt="To" />
        <select id="to"></select>
      </div>
    </div>

    <button id="convert">Convert</button>
    <p id="result">💰 Ready to convert</p>

    <button id="theme-toggle">🌙</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
